<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucode Style Guide</title>
  <style>
    html:not([data-theme]) body,
    html[data-theme="dark"] body {
      background-color: #020617;
      color: #f1f5f9;
    }

    html[data-theme="light"] body {
      background-color: #ffffff;
      color: #1f2328;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/style-guide.tsx"></script>
</body>

</html>
