name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    if: github.repository == 'lucacri/lucode'

    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: lucacri/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Fetch release artifact metadata
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          RELEASE_RESPONSE=$(curl -sSf -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/lucacri/lucode/releases/tags/v${VERSION}")
          ASSET_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url' | head -1)
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Unable to locate DMG asset in release v${VERSION}" >&2
            exit 1
          fi

          curl -L "$ASSET_URL" -o "Lucode-${VERSION}-universal.dmg"

          SHA256=$(shasum -a 256 "Lucode-${VERSION}-universal.dmg" | cut -d' ' -f1)
          echo "SHA256=${SHA256}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Update Lucode Cask
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/lucode.rb << 'EOF'
          cask "lucode" do
            version "${{ env.VERSION }}"
            sha256 "${{ env.SHA256 }}"

            url "https://github.com/lucacri/lucode/releases/download/v#{version}/Lucode-#{version}-universal.dmg"
            name "Lucode"
            desc "Visual interface for managing Para sessions"
            homepage "https://github.com/lucacri/lucode"

            uninstall_preflight do
              staged_app = staged_path/"Lucode.app"
              next unless staged_app.exist?

              # The staged path should normally be a symlink. If it is a real directory,
              # a previous upgrade was interrupted and left a full copy behind which
              # breaks subsequent upgrades. Clean it up before Homebrew runs move_back.
              next if staged_app.symlink?

              require "fileutils"
              FileUtils.rm_rf(staged_app)
            end

            app "Lucode.app"

            postflight do
              # Remove quarantine attribute
              system_command "/usr/bin/xattr",
                            args: ["-cr", "#{appdir}/Lucode.app"],
                            sudo: false

              # Ad-hoc sign if needed
              system_command "/usr/bin/codesign",
                            args: ["--force", "--deep", "-s", "-", "#{appdir}/Lucode.app"],
                            sudo: false

              # Create wrapper script for CLI with better handling
              wrapper_script = "#{HOMEBREW_PREFIX}/bin/lucode"
              File.write wrapper_script, <<~SHELL
                #!/bin/bash
                APP_PATH="#{appdir}/Lucode.app"
                EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/lucode"

                if [ $# -eq 0 ]; then
                  open "$APP_PATH"
                else
                  TARGET_DIR="$1"
                  [[ ! "$TARGET_DIR" = /* ]] && TARGET_DIR="$(pwd)/$TARGET_DIR"
                  TARGET_DIR="${TARGET_DIR%/}"

                  if [ ! -d "$TARGET_DIR" ]; then
                    echo "Error: Directory not found: $TARGET_DIR" >&2
                    exit 1
                  fi

                  "$EXECUTABLE_PATH" "$TARGET_DIR" &
                fi
              SHELL
              File.chmod 0755, wrapper_script

              ohai "Lucode MCP configuration is now available through Settings → Agent Configuration → Claude tab."
            end

            uninstall delete: [
              "#{HOMEBREW_PREFIX}/bin/lucode",
            ]

            zap trash: [
              "~/Library/Application Support/lucode",
              "~/Library/Logs/lucode",
              "~/Library/Preferences/com.lucacri.lucode.plist",
              "~/Library/Saved Application State/com.lucacri.lucode.savedState",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/lucode.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Lucode to ${{ env.VERSION }}"
            git push
          fi
