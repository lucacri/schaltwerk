<!doctype html>
<html lang="en" data-theme="darcula">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucode Sidebar Playground</title>
  <style>
    html[data-theme="darcula"] body,
    html:not([data-theme]) body {
      background-color: #242328;
      color: #a9b7c6;
    }
    html[data-theme="light"] body {
      background-color: #ffffff;
      color: #1f2328;
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    #root {
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
