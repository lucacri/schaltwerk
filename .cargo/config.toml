[build]
# Keep incremental enabled for faster local edit/compile cycles.
# CI can still disable it explicitly via CARGO_INCREMENTAL=0 when needed.

# macOS Intel
[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

# macOS ARM (Apple Silicon)
[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

# Linux x86_64 - use mold linker if available (install: apt/brew install mold)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "strip=debuginfo"]

# Linux ARM64
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "strip=debuginfo"]

[net]
git-fetch-with-cli = true
